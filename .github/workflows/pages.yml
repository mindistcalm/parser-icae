name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  # 1-го числа каждого месяца в 09:00 МСК (06:00 UTC) — поиск + публикация
  schedule:
    - cron: "0 6 1 * *"
  workflow_dispatch:
    inputs:
      run_parser:
        description: "Запустить поиск перед публикацией"
        required: false
        default: true
        type: boolean
      month:
        description: "Месяц отчёта YYYY-MM (пусто = прошлый месяц)"
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore parser cache
        uses: actions/cache@v4
        with:
          path: |
            data/mentions.db
            reports
          key: parser-cache-${{ github.run_id }}
          restore-keys: |
            parser-cache-

      - name: Install Python dependencies
        run: pip install -e .

      - name: Run monthly parser
        if: >
          github.event_name == 'schedule' ||
          github.event.inputs.run_parser == 'true'
        run: |
          if [ -n "${{ github.event.inputs.month }}" ]; then
            icae-parser run --month "${{ github.event.inputs.month }}"
          else
            icae-parser run
          fi

      - name: Export static data
        run: python scripts/export_static_data.py

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install and build frontend
        working-directory: web
        env:
          VITE_BASE_PATH: /parser-icae/
          VITE_STATIC: "true"
        run: |
          npm ci
          npm run build
          cp dist/index.html dist/404.html

      - name: Save parser cache
        uses: actions/cache/save@v4
        with:
          path: |
            data/mentions.db
            reports
          key: parser-cache-${{ github.run_id }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
